aid: mediamath
name: MediaMath
description: MediaMath (by Infillion) is a programmatic advertising DSP with REST
  APIs for managing campaigns, targeting, bidding strategies, creative trafficking,
  audience segments, and performance analytics. The platform provides an API-first
  composable architecture supporting campaign management, reporting, audience onboarding,
  marketplaces access, and custom bidding algorithms.
