- name: MediaMath Audience Onboarding API
  description: API for ingesting audience event data into the MediaMath Platform via
    real-time server-side pixel events and batch event uploads. Supports UUID, mobile
    advertising IDs, and CTV device IDs for cross-device audience building and segment
    management.
