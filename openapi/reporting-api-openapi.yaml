                          - OK
                        type: string
                      total_items_count:
                        minimum: 0
                        type: integer
                      total_pages:
                        minimum: 0
                        type: integer
                    type: object
                  results:
                    items:
                      type: object
                    type: array
                type: object
            application/jsonl:
              schema:
                $ref: '#/components/schemas/StreamingResponse'
          description: JSON for Paginated, JSONL for Streaming
