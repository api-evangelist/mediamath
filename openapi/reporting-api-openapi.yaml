                  op: '='
                  value: 123456
                - field: agency_id
                  value:
                    - 123456
                    - 789012
                - field: advertiser_id
                  value: 123456
                - field: campaign_name
                  op: '=~'
                  value: Test Campaign
              order:
                - desc: false
                  field: agg_timestamp
                  nulls_last: true
              pagination:
                page_index: 0
                page_size: 100
              rollup: by_day
              time_window: current_day
            schema:
              oneOf:
                - required:
                    - time_window
                  title: Time Window
                - required:
                    - start_time
                  title: Date Range
              properties:
                end_time:
                  format: date-time
                  nullable: true
                  type: string
                fields:
                  items:
                    type: string
                  minItems: 1
                  type: array
                  uniqueItems: true
                filters:
                  items:
                    properties:
                      field:
                        type: string
                      filters:
                        items:
                          properties:
                            field:
                              type: string
                            filters:
                              description: >-
                                An array of filters. Required if `op` is `and`
                                or `or`.
                              items:
                                type: object
                              type: array
                            op:
                              default: '='
                              description: |-
                                * `=`: Equals or contains if `value` is an array
                                * `!=`: Not equals
                                * `>`: Greater than
                                * `>=`: Greater than or equals
                                * `<`: Less than
                                * `<=`: Less than or equals
                                * `=~`: Text contains (case-insensitive)
                                * `and`: All filters must match
                                * `or`: At least one filter must match
                                * `isNull`: Is null
                                * `isNotNull`: Is not null
                              type: string
                            value:
                              anyOf:
                                - anyOf:
                                    - type: integer
                                    - type: number
                                    - type: string
                                    - type: boolean
                                - items:
                                    anyOf:
                                      - type: integer
                                      - type: number
                                      - type: string
                                      - type: boolean
                                  type: array
                          type: object
                        minItems: 2
                        nullable: true
                        type: array
                      op:
                        default: '='
                        description: |-
                          * `=`: Equals or contains if `value` is an array
                          * `!=`: Not equals
                          * `>`: Greater than
                          * `>=`: Greater than or equals
                          * `<`: Less than
                          * `<=`: Less than or equals
                          * `=~`: Text contains (case-insensitive)
                          * `and`: All filters must match
                          * `or`: At least one filter must match
                          * `isNull`: Is null
                          * `isNotNull`: Is not null
                        type: string
                      value:
                        anyOf:
                          - anyOf:
                              - type: integer
                              - type: number
                              - type: string
                              - type: boolean
                          - items:
                              anyOf:
                                - type: integer
                                - type: number
                                - type: string
                                - type: boolean
                            type: array
                    type: object
                  minItems: 1
                  type: array
                full_entities:
                  items:
                    type: string
                  minItems: 1
                  nullable: true
                  type: array
                  uniqueItems: true
                max_results:
                  description: >-
                    Maximum number of results to return. Only applicable for
                    streaming responses. No limit if absent or `null`.
                  minimum: 1
                  nullable: true
                  type: integer
                order:
