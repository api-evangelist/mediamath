ession_based`<br>75% Completed Rate - Impressions Based|Any|Any|\n|`video_unmute`<br>Unmute|Any|Any|\n|`viewability_rate`<br>Viewability Rate|Any|Any|\n|`viewability_rate_100_percent`<br>100% In View Rate|Any|Any|\n|`watermark_impressions`<br>|Any|Any|\n\n### Pageable\nYes\n\n### Time Windows\n`current_day`, `last_X_days`, `yesterday`, `month_to_date`\n\n### Rollups\n`all`, `by_day`, `by_week`, `by_month`\n\n\n### Data Retention / Lookback Window\n3 years\n"
