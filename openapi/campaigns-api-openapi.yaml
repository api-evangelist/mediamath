          type: boolean
          description: >-
            Set flag to 'on’ to be able to override default org wide suspicious
            traffic filter level.
        restrict_targeting_to_same_device_id:
          type: boolean
        restrict_targeting_to_deterministic_id:
          type: boolean
        suspicious_traffic_filter_level:
          type: integer
          minimum: 0
          maximum: 100
          description: >
            Specify an organization-wide level of suspicious traffic filtering
            to use. See the Knowledge Base for additional details about this
            feature. This setting will only take affect if the organization's
            override_suspicious_traffic_filter property is set to 'on'.

            If override_suspicious_traffic_filter is enabled and
            suspicious_traffic_filter_level is set to 0, all fraud and
            suspicious traffic will be filtered.
        use_ads_txt:
          type: boolean
        use_evidon_optout:
          type: boolean
          nullable: true
          description: >-
            Set flag to 'on’ to show an opt out button on the organization's ads
            (additional CPM fee will apply when on).
        eligible_for_data_sharing:
          type: boolean
        holding_org_id:
          type: integer
          nullable: true
          format: int32
          example: 8
        service_provider_ccpa:
          type: boolean
        mfa_avoidance:
          type: string
          enum:
            - ALLOW_ALL
            - EXCLUDE_MFA
        mm_contact_name:
          type: string
          maxLength: 64
          description: >-
            This is the name of the primary internal MediaMath contact of the
            Organization.
        adx_seat_account_id:
          type: integer
          minimum: 1
          format: int64
          maximum: 9223372036854776000
          example: 1
          description: >-
            Passed to ADX upon creative registration so ADX knows which seat
            we're registering under.
        connected_id_type:
          type: string
          enum:
            - DETERMINISTIC_FIRST
        contact_name:
          type: string
          maxLength: 64
          description: >-
            This is the primary contact at the organization regarding contract
            issues.
        address_1:
          type: string
          maxLength: 256
          description: >-
            The primary address line, typically includes street address and
            number.
        address_2:
          type: string
          maxLength: 256
          nullable: true
          description: >-
            The secondary address line, used for additional information such as
            apartment, suite, or unit number.
        city:
          type: string
          maxLength: 32
          description: The city of the address.
        state:
          type: string
          maxLength: 2
          description: The state of the address, represented as a 2-character code.
        zip:
          type: string
          maxLength: 10
          description: The postal or ZIP code for the address.
        country:
          type: string
          maxLength: 2
          description: >-
            The country of the address, represented as a 2-character ISO country
            code.
        phone:
          type: string
          maxLength: 24
          description: >-
            The phone number associated with the address, including country code
            if applicable.
        currency_code:
          type: string
          maxLength: 3
          description: Currency code for the campaign budget and spend, as well as billing.
        billing_country_code:
          type: string
          description: Country code that is used for billing purposes.
        dmp_enabled:
          type: string
          enum:
            - enabled
            - disabled
        seats:
          type: array
          items:
            $ref: '#/components/schemas/exchange_seat'
          nullable: true
        mcp_enabled:
          type: boolean
          default: false
          description: >-
            Controls whether the organization is permitted to access the
            platform via MCP (Model Context Protocol) tooling.
        mcp_access_level:
          type: string
          enum:
            - read_only
            - read_write
          description: >-
            Determines the scope of MCP access for the organization. 'read_only'
            permits read/query operations only. 'read_write' permits all
            operations including create and update.
        inf_business_unit:
          type: string
          description: Available only for internal users.
          nullable: true
        environment:
          type: string
          description: Available only for internal users.
          nullable: true
