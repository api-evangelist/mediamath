  /technology_target_values:
    get:
      operationId: list-technology-target-values
      summary: List Technology Target Values
      description: |
        Get list of technology target values. Can be sorted by:
        - `id`,
        - `dimension`,
        - `parent_id`,
        - `name`,
        - `full_path`,
        - `value`,
        - `code`,
        - `sortable_name` 
        and queried (with `q=`) by:
        - `id`,
        - `parent_id`,
        - `name`,
        - `full_path` (if provided parameter `full_path` will be ignored),
        - `value`,
        - `code`,
        - `sortable_name`.
      tags:
        - Targeting
      parameters:
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: 'Case insensitive name contains search. Example: `name=target1`'
        - in: query
          name: full_path
          schema:
            type: string
          required: false
          description: >-
            Case insensitive full_path contains search. Example:
            `full_path=target1`
        - in: query
          name: dimension_code
          schema:
            type: string
          required: true
          description: >
            Comma separated list of dimension codes. Example:
            `dimension_code=BRLG,BSER`. Supported values:
             - `BRLG` - Browser Language,
             - `OSXX` - Operating System (extended),
             - `BSER` - Browser,
             - `CSPD` - Connection Speed,
             - `DVMD` - Device Model,
             - `DVCE` - Device,
             - `INVT` - Inventory (supply source/publisher),
             - `ISPX` - ISP (Internet Service Provider),
             - `VAUD` - Video: Audibility,
             - `VCON` - Video: Context,
             - `VLIN` - Video: Linearity (linear vs non-linear),
             - `VPLC` - Video: Placement,
             - `VPSZ` - Video: Player Size,
             - `VSKP` - Video: Skippability,
             - `DMAX` - Designated Market Area,
             - `REGN` - Region (geographic region),
             - `COUNTRY` - Country,
             - `CITY` - City.
        - $ref: '#/components/parameters/sort_by'
        - $ref: '#/components/parameters/q'
      responses:
        '200':
          $ref: '#/components/responses/list_technology_target_values'
        '400':
          $ref: '#/components/responses/error'
        '401':
          $ref: '#/components/responses/error'
        '403':
          $ref: '#/components/responses/error'
