  /creative_upload:
    post:
      operationId: upload-creative-assets
      summary: Creative assets upload
      description: >
        Upload creative assets to the system and create atomic creatives. This
        endpoint processes the uploaded 

        files and metadata, validates them, and stores them permanently in the
        system. Once uploaded, the 

        creatives can be associated with campaigns and strategies.
      tags:
        - Atomic Creatives
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - filename
                - metadata
              properties:
                filename:
                  type: array
                  description: Creative asset files to upload
                  minItems: 1
                  maxItems: 10
                  items:
                    type: string
                    format: binary
                    x-allowed-extensions:
                      - .gif
                      - .jpg
                      - .jpeg
                      - .png
                      - .tiff
                      - .tif
                      - .svg
                      - .swf
                      - .htm
                      - .html
                      - .css
                      - .js
                      - .woff
                      - .woff2
                      - .ttf
                      - .otf
                      - .zip
                    x-max-file-size: 10485760
                metadata:
                  type: object
                  description: JSON string containing metadata for all files
                  required:
                    - advertiser_id
                    - submissions
                  properties:
                    advertiser_id:
                      type: integer
                      format: int32
                      minimum: 0
                      example: 123
                    is_https:
                      type: boolean
                      default: true
                    submissions:
                      type: array
                      description: >-
                        This array should contain an entry for each file being
                        uploaded (or the files inside the outer zip for HTML5
                        creatives), with details about the creative.
                      minItems: 1
                      items:
                        type: object
                        required:
                          - name
                          - click_through_url
                          - concept_id
                        properties:
                          name:
                            type: string
                            maxLength: 256
                            example: one.jpg
                            description: >-
                              The name of the creative file. For HTML5
                              creatives, this should match the filename inside
                              the zip (e.g., "interactive_ad.zip"). For zip
                              files containing images, this should match the
                              filename inside the zip. For non-HTML5 creatives,
                              this should match the uploaded filename.
                          click_through_url:
