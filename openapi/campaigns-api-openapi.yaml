openapi: 3.0.0
info:
  title: Campaigns API
  description: >
    MediaMath Campaign Management API


    [Postman
    Collection](https://apidocs.mediamath.com/guides/postman-collections)
  version: 3.0.1807
  contact:
    url: https://support.infillion.com/
paths:
  /attachments:
    get:
      operationId: list-attachments
      summary: Get a List of Attachments
      description: >
        Get a list of attachments. Attachments can be queried and sorted by
        fields: 

        - `id`, 

        - `target_id`,

        - `strategy_id`,

        - `restriction`,

        - `operator`,

        - `created_on`,

        - `updated_on`,

        - `version`,

        - `or_better`.
      tags:
        - Targeting Attachments
      parameters:
        - $ref: '#/components/parameters/page_limit'
        - $ref: '#/components/parameters/page_offset'
        - $ref: '#/components/parameters/sort_by'
        - $ref: '#/components/parameters/q'
        - in: query
          name: strategy_id
          schema:
            type: integer
            example: 123
          required: false
          description: >-
            If provided, only attachments for given strategy_id will be
            returned.
        - in: query
          name: dimension
          schema:
            type: string
            example: WURF,BRLG
          required: false
          description: |
            If provided, only attachments for given dimension will be returned. 
            Can be used with one or several dimensions.
      responses:
        '200':
          $ref: '#/components/responses/attachments_list'
        '400':
          $ref: '#/components/responses/error'
        '401':
          $ref: '#/components/responses/error'
        '403':
          $ref: '#/components/responses/error'
    post:
      operationId: create-attachment
      summary: Create an Attachment
      description: Create an attachment
      tags:
        - Targeting Attachments
      responses:
        '201':
          $ref: '#/components/responses/attachment'
        '400':
          $ref: '#/components/responses/error'
        '401':
          $ref: '#/components/responses/error'
        '403':
          $ref: '#/components/responses/error'
      requestBody:
        $ref: '#/components/requestBodies/attachment_create'
  /attachment:
