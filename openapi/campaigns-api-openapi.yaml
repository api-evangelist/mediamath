      description: Create a strategy group within a campaign.
      tags:
        - New Strategy Groups
      requestBody:
        $ref: '#/components/requestBodies/new_strategy_group_create'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/new_strategy_group_response'
        '400':
          $ref: '#/components/responses/error'
        '401':
          $ref: '#/components/responses/error'
        '403':
          $ref: '#/components/responses/error'
