          type: string
          minLength: 1
          maxLength: 64
          description: >
            The name of the organization with whom the contract is held.

            This can be an agency holding company, agency, advertiser, network,
            or other media or data buying entity.
        org_type:
          type: array
          uniqueItems: true
          items:
            type: string
            enum:
              - buyer
              - partner
          description: >-
            The `org_type` field is an array that specifies the type of
            organization.
        status:
