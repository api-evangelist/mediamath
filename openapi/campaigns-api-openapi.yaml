                            - target_dimension_code
                            - target_dimension_name
                            - target_value_id
                            - target_value_name
                            - target_value_value
                            - target_value_code
                            - strategy_count
                  meta:
                    type: object
                    required:
                      - status
                      - count
                    properties:
                      status:
                        type: string
                        minLength: 1
                      count:
                        type: number
                  errors:
