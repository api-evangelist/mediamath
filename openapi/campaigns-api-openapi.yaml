  parameters:
    page_limit:
      in: query
      name: page_limit
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        example: 100
      required: false
      description: Number of elements in the collection to retrieve
    page_offset:
      in: query
      name: page_offset
      schema:
        type: integer
        minimum: 0
        maximum: 1000
        example: 0
      required: false
      description: Index of the first element in the collection to retrieve
    sort_by:
      in: query
      name: sort_by
      description: >
        The field to sort by. You can use any field name in ascending or
        descending order.

        For ascending order, use the field name directly, e.g., `id`. 

        For descending order, prefix the field name with a hyphen (`-`), e.g.,
        `-id`.
      schema:
        type: string
        example: id, -id, name, -name
      required: false
    q:
      in: query
      name: q
      schema:
        type: string
      required: false
      description: >
        Query search for filtering. This parameter can be used to filter results
        based on various fields.

        Supported operators:

        - `==` - numeric equality or case-sensitive string identity, 

        - `==(1,2,3)` - IN query (only works for integers),

        - `!=` - numeric inequality or case-sensitive string non-identity,

        - `=:` - case-insensitive match, allows substring using * wildcards,

        - `<` - less than,

        - `<=` - less than or equal to,

        - `>` - greater than,

        - `>=` - greater than or equal to.

        Examples: 

        - `q=name=:{search}*` to find all results with names starting with
        {search}.

        - `q=status==true` to find all active entities.

        - `q=id>=1000` to find all entities with id greater than or equal to
        1000.

        - `q=id==(1,2,3)` to find specific entities by ID.

        - `q=created_on>1999-02-02` or `q=created_on>1999-02-02T00:00:00Z` to
        find entities created later than date.

        - `q=id>5&status==true` to find all active entities with id greater than
        5.
    full:
      in: query
      name: full
      schema:
        type: string
        example: '*'
      required: false
      description: >
        To return all fields, set the value to `*`. For example, `full=*` will
        include all properties.
    extended:
      in: query
      name: extended
      schema:
        type: boolean
      required: false
      description: Get extended properties in response
    advertisers_with:
      in: query
      name: with
      schema:
        type: string
        enum:
          - agency
      required: false
      description: Get related property in response
    agencies_with:
      in: query
      name: with
      schema:
        type: string
        enum:
          - organization
      required: false
      description: Get related property in response
    strategy_with:
      in: query
      name: with
      schema:
        type: string
        enum:
          - technology
          - location
          - ip_addresses
          - geofences
          - my_data
          - audience
          - contextual
          - deals
          - site_lists
          - supply
          - domain_restrictions
          - concepts
          - day_parts
          - fold_positions
      required: false
      description: Get related property in response
    campaign_with:
      in: query
      name: with
      schema:
        type: string
        enum:
          - advertiser
          - agency
      required: false
      description: >-
        Get related property in response, values can be combined via `,`
        (example: `agency,advertiser`)
    q_required:
      in: query
      name: q
      schema:
        type: string
      required: true
      description: >
        Query search for filtering. This parameter can be used to filter results
        based on various fields.

        Supported operators:

        - `==` - numeric equality or case-sensitive string identity, 

        - `==(1,2,3)` - IN query (only works for integers),

        - `!=` - numeric inequality or case-sensitive string non-identity,

        - `=:` - case-insensitive match, allows substring using * wildcards,

        - `<` - less than,

        - `<=` - less than or equal to,

        - `>` - greater than,

        - `>=` - greater than or equal to.

        Examples: 

        - `q=name=:{search}*` to find all results with names starting with
        {search}.

        - `q=status==true` to find all active entities.

        - `q=id>=1000` to find all entities with id greater than or equal to
        1000.

        - `q=id==(1,2,3)` to find specific entities by ID.

        - `q=created_on>1999-02-02` or `q=created_on>1999-02-02T00:00:00Z` to
        find entities created later than date.

        - `q=id>5%26status==true` to find all active entities with id greater
        than 5.
    strategy_deals_with:
      in: query
      name: with
      schema:
        type: string
        enum:
