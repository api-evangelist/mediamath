      summary: Copy a strategy
      description: Copy a strategy
      parameters:
        - in: path
          name: strategy_id
          schema:
            type: integer
          required: true
          description: Numeric ID of the strategy object
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
