          maxLength: 512
          nullable: true
        linkedin:
          type: string
          maxLength: 512
          nullable: true
        twitter:
          type: string
          maxLength: 512
          nullable: true
        allow_x_agency_pixels:
          type: boolean
          description: >
            This field enables the Data Co-op functionality across all the
            Advertisers under this organization.

            Cross-Advertiser Pixel Targeting allows Advertisers to target other
            Advertiser Event Pixels within their Agency and any other similarly
            enabled Agency under the same Organization.
        allow_byo_price:
          type: boolean
        opt_out_connected_id:
          type: boolean
        opt_out_connected_id_mathid:
          type: boolean
