      summary: List New Strategy Groups
      description: >
        Get a paginated list of strategy groups. The `q` parameter must include
        a

        `campaign_id==<id>` clause (required for permission scoping); additional
        filter

        clauses (joined by `&`, URL-encoded as `%26`) and `sort_by` follow the
        standard

        Campaigns API list-endpoint convention and may reference any
        `strategy_groups`

        column — e.g.
        `q=campaign_id==100%26name=:Prospecting*&sort_by=-spend_cap_amount`.
      tags:
        - New Strategy Groups
      parameters:
        - $ref: '#/components/parameters/page_limit'
        - $ref: '#/components/parameters/page_offset'
        - $ref: '#/components/parameters/sort_by'
        - $ref: '#/components/parameters/q'
        - in: query
          name: full
          schema:
            type: string
          required: false
          description: Pass `full=*` to return the full entity in each list item.
        - in: query
          name: with
          schema:
            type: string
          required: false
          description: >-
            Comma-separated list of related entities to embed. Only `strategies`
            is supported; when set, the full response includes a `strategies`
            array of `{id, entity_type, name}` per group.
      responses:
        '200':
          description: List new strategy groups response
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/new_strategy_group_collection'
                  - $ref: '#/components/schemas/new_strategy_group_collection_full'
        '400':
          $ref: '#/components/responses/error'
        '401':
          $ref: '#/components/responses/error'
        '403':
          $ref: '#/components/responses/error'
